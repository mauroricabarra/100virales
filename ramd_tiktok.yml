name: Scraper Ramdam TikTok Trends

on:
  schedule:
    - cron: "0 9 * * 1"   # todos los lunes a las 9am UTC (se actualiza semanalmente)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install selenium webdriver-manager beautifulsoup4 lxml

      - name: Correr scraper
        run: python ramd_tiktok_scraper.py

      - name: Publicar archivos actualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ramd_tiktok_trends.json ramd_tiktok_trends.xml
          git diff --staged --quiet || git commit -m "update: tiktok trends $(date -u '+%Y-%m-%d')"
          git push
